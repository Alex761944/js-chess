<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./css/root.css" />
    <link rel="stylesheet" href="./css/styles.css" />

    <title>Chess</title>
  </head>
  <body>
    <div class="CurrentPlayerIndicator">
      <p>Current player: Light</p>

    <div class="BoardWrapper">

        <div class="Ranks">
          <div class="Rank">
            <p>8</p>
          </div>

          <div class="Rank">
            <p>7</p>
          </div>

          <div class="Rank">
            <p>6</p>
          </div>

          <div class="Rank">
            <p>5</p>
          </div>

          <div class="Rank">
            <p>4</p>
          </div>

          <div class="Rank">
            <p>3</p>
          </div>

          <div class="Rank">
            <p>2</p>
          </div>

          <div class="Rank">
            <p>1</p>
          </div>
        </div>

        <div class="Board"></div>
      </div>

      <div class="Files">
        <div class="File">
          <p>A</p>
        </div>

        <div class="File">
          <p>B</p>
        </div>

        <div class="File">
          <p>C</p>
        </div>

        <div class="File">
          <p>D</p>
        </div>

        <div class="File">
          <p>E</p>
        </div>

        <div class="File">
          <p>F</p>
        </div>

        <div class="File">

        </div>

        <div class="File">
